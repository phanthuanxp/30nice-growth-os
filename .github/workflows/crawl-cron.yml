name: Auto Crawl & Rewrite

on:
  schedule:
    # Every Monday and Thursday at 2:00 AM UTC (9:00 AM Vietnam time)
    - cron: "0 2 * * 1,4"
  workflow_dispatch:

jobs:
  crawl:
    name: Run Content Crawl Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Trigger crawl pipeline
        run: |
          RESPONSE=$(curl -s -o /tmp/crawl_response.json -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://admin.30nice.vn/api/cron/crawl")

          echo "HTTP status: $RESPONSE"
          cat /tmp/crawl_response.json

          if [ "$RESPONSE" != "200" ]; then
            echo "Crawl pipeline failed with HTTP $RESPONSE"
            exit 1
          fi

          echo "Crawl pipeline completed successfully"
